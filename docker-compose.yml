services:
  libby-service:
    build: .
    ports:
      # Host-side ports are overridable (e.g. if 8000/6080 are already taken
      # on this Docker host) -- set WEB_PORT/VNC_PORT as stack environment
      # variables in Portainer, or in a .env file next to this compose file.
      - "${WEB_PORT:-8000}:8000"   # web UI (dashboard / auth / history / config)
      - "${VNC_PORT:-6080}:6080"   # noVNC, embedded as an iframe by the auth page
    environment:
      # The auth page's iframe is built browser-side from this value, so it
      # must match whatever host port VNC_PORT above actually publishes.
      - VNC_PORT=${VNC_PORT:-6080}
    volumes:
      # App state: session file (.libby_session.json) + the SQLite
      # history/config db. Defaults to the "libby-data" named
      # (Docker-managed) volume declared below -- not a relative bind mount
      # like ./data, which Portainer's "Repository" stack build can silently
      # resolve to a fresh, empty directory on every redeploy (this is why
      # config/history was resetting). To use a specific host folder
      # instead (for easy backup/inspection), set DATA_DIR to an ABSOLUTE
      # path as a stack environment variable, e.g. DATA_DIR=/srv/libby-data
      # -- Compose treats an absolute-path value here as a bind mount
      # instead of a named-volume reference. A relative path would have the
      # exact same silent-reset problem ./data just had, so don't use one.
      - ${DATA_DIR:-libby-data}:/data
      # Downloaded books. Set BOOKS_DIR to an ABSOLUTE path on your host
      # (e.g. BOOKS_DIR=/mnt/media/audiobooks, as a stack environment
      # variable in Portainer) -- a relative default here would have the
      # exact same silent-reset problem ./data just had.
      - ${BOOKS_DIR:-./MyBooks}:/books
    restart: unless-stopped

volumes:
  libby-data:
