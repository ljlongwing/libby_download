{% extends "base.html" %}
{% block content %}
<h1>Config</h1>
<form method="post" action="/config">
  <label for="output_dir">Output directory (inside the container)</label>
  <input type="text" id="output_dir" name="output_dir" value="{{ config.output_dir }}">

  <label for="scan_interval_minutes">Scan interval (minutes)</label>
  <input type="number" min="1" id="scan_interval_minutes" name="scan_interval_minutes" value="{{ config.scan_interval_minutes }}">

  <p><input type="submit" value="Save"></p>
</form>
{% endblock %}
