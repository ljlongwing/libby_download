<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Audiobook Auto-Download</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    nav a { margin-right: 1rem; text-decoration: none; color: #0b5fff; }
    nav { margin-bottom: 1.5rem; border-bottom: 1px solid #ddd; padding-bottom: 1rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
    .status-complete { color: #1a7f37; }
    .status-failed { color: #c00; }
    .status-downloading, .status-pending { color: #a06a00; }
    button, input[type=submit] { padding: 0.5rem 1rem; cursor: pointer; }
    input[type=text], input[type=number] { padding: 0.4rem; width: 100%; max-width: 400px; }
    label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
    iframe#vnc { width: 100%; height: 600px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/auth/libby">Libby Auth</a>
    <a href="/auth/chirp">Chirp Auth</a>
    <a href="/history">History</a>
    <a href="/config">Config</a>
  </nav>
  {% block content %}{% endblock %}
  <script>
    // Every timestamp is rendered server-side in UTC (as an ISO string in
    // the datetime attribute, with that same UTC string as fallback text
    // for no-JS cases) and converted here to whatever timezone the
    // viewer's own browser is in -- avoids having to configure a timezone
    // for the container/deployer, which may not match whoever's actually
    // looking at the dashboard.
    document.querySelectorAll('.local-time').forEach(el => {
      const iso = el.getAttribute('datetime');
      if (!iso) return;
      const d = new Date(iso);
      if (isNaN(d)) return;
      el.textContent = d.toLocaleString(undefined, {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit',
      });
    });
  </script>
</body>
</html>
